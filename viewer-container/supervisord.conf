[supervisord]
nodaemon=true

[program:xvfb]
command=Xvfb :1 -screen 0 1920x1080x24
environment=DISPLAY=:1
autorestart=true

[program:fluxbox]
command=fluxbox
environment=DISPLAY=:1
autorestart=true

[program:x11vnc]
command=x11vnc -display :1 -forever -nopw
environment=DISPLAY=:1
autorestart=true

[program:novnc]
command=/usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080
autorestart=true

[program:mricrogl]
command=/app/MRIcroGL/MRIcroGL
environment=DISPLAY=:1
directory=/app/MRIcroGL
autorestart=true